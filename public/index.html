<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐鉴赏课评价系统 - 登录</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-header">
      <div class="logo">🎵</div>
      <h1>音乐鉴赏课评价系统</h1>
      <p>智慧课堂 · 即时问答 · AI评价</p>
    </div>
    
    <div class="login-tabs">
      <button class="tab-btn active" data-tab="teacher">教师登录</button>
      <button class="tab-btn" data-tab="admin">管理员</button>
    </div>
    
    <!-- 教师登录表单 -->
    <form id="teacher-form" class="login-form active">
      <div class="form-group">
        <label for="teacher-username">用户名</label>
        <input type="text" id="teacher-username" placeholder="请输入用户名" required>
      </div>
      <div class="form-group">
        <label for="teacher-password">密码</label>
        <input type="password" id="teacher-password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">登录</button>
    </form>
    
    <!-- 管理员登录表单 -->
    <form id="admin-form" class="login-form">
      <div class="form-group">
        <label for="admin-username">管理员账号</label>
        <input type="text" id="admin-username" placeholder="请输入管理员账号" required>
      </div>
      <div class="form-group">
        <label for="admin-password">密码</label>
        <input type="password" id="admin-password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">登录</button>
    </form>
    
    <div class="login-divider">
      <span>或</span>
    </div>
    
    <!-- 学生扫码入口 -->
    <div class="student-section">
      <p class="student-hint">我是学生，请扫描课堂二维码加入</p>
      <button class="btn btn-secondary btn-block" onclick="showScanHint()">
        📱 查看如何加入
      </button>
    </div>
    
    <div class="login-footer">
      <p class="demo-hint">演示账号：teacher01 / teacher123</p>
    </div>
  </div>
  
  <!-- 学生扫码提示弹窗 -->
  <div id="scan-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>学生加入课堂</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="scan-steps">
          <div class="step">
            <span class="step-num">1</span>
            <span class="step-text">扫描老师展示的课堂二维码</span>
          </div>
          <div class="step">
            <span class="step-num">2</span>
            <span class="step-text">输入您的姓名</span>
          </div>
          <div class="step">
            <span class="step-num">3</span>
            <span class="step-text">开始答题并查看评价</span>
          </div>
        </div>
        <div class="scan-demo">
          <div class="demo-qr" id="demo-qr"></div>
          <p class="demo-text">扫描二维码体验演示</p>
        </div>
      </div>
    </div>
  </div>
  
  <script src="/js/common.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Tab切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
        
        btn.classList.add('active');
        document.getElementById(`${tab}-form`).classList.add('active');
      });
    });
    
    // 教师登录
    document.getElementById('teacher-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('teacher-username').value;
      const password = document.getElementById('teacher-password').value;
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role: 'teacher' })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          window.location.href = '/teacher';
        } else {
          showToast(data.message || '登录失败');
        }
      } catch (error) {
        showToast('登录失败，请稍后再试');
      }
    });
    
    // 管理员登录
    document.getElementById('admin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('admin-username').value;
      const password = document.getElementById('admin-password').value;
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role: 'admin' })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          window.location.href = '/admin';
        } else {
          showToast(data.message || '登录失败');
        }
      } catch (error) {
        showToast('登录失败，请稍后再试');
      }
    });
    
    // 显示扫码提示
    function showScanHint() {
      document.getElementById('scan-modal').classList.add('show');
    }
    
    // 关闭弹窗
    function closeModal() {
      document.getElementById('scan-modal').classList.remove('show');
    }
    
    // 点击弹窗外部关闭
    document.getElementById('scan-modal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) {
        closeModal();
      }
    });
    
    // 生成演示二维码
    function generateDemoQR() {
      const demoSessionId = 'demo123456';
      const demoUrl = `${window.location.origin}/answer/${demoSessionId}`;
      
      // 生成二维码（使用在线API）
      const qrContainer = document.getElementById('demo-qr');
      qrContainer.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(demoUrl)}" alt="演示二维码">`;
    }
    
    // 页面加载时生成演示二维码
    generateDemoQR();
    
    // Toast提示
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
  </script>
</body>
</html>
