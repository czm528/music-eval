<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师工作台 - 音乐鉴赏课评价系统</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
</head>
<body class="teacher-page">
  <header class="top-header">
    <div class="header-left">
      <h1>🎵 音乐鉴赏课评价系统</h1>
    </div>
    <div class="header-right">
      <span id="user-name">教师</span>
      <button class="btn btn-text" onclick="logout()">退出</button>
    </div>
  </header>
  
  <div class="main-container">
    <!-- 左侧：课堂列表 -->
    <aside class="classroom-list">
      <div class="list-header">
        <h2>我的课堂</h2>
        <button class="btn btn-primary btn-sm" onclick="showCreateClassroom()">
          + 新建
        </button>
      </div>
      
      <div class="classroom-items" id="classroom-list">
        <div class="loading">加载中...</div>
      </div>
    </aside>
    
    <!-- 右侧：课堂详情/看板 -->
    <main class="classroom-detail">
      <div id="no-classroom" class="empty-state-full">
        <div class="empty-icon">📋</div>
        <h3>选择或创建一个课堂</h3>
        <p>点击左侧「新建」按钮创建课堂</p>
      </div>
      
      <div id="classroom-view" class="hidden">
        <div class="detail-header">
          <div class="detail-info">
            <h2 id="classroom-name">课堂名称</h2>
            <p id="classroom-desc">课堂描述</p>
          </div>
          <div class="detail-actions">
            <button class="btn btn-secondary" onclick="showQRCode()">📱 二维码</button>
            <button class="btn btn-danger" onclick="endClassroom()">结束课堂</button>
          </div>
        </div>
        
        <!-- 实时数据看板 -->
        <div class="dashboard-grid">
          <div class="dashboard-card stat">
            <div class="card-icon">👥</div>
            <div class="card-content">
              <span class="card-num" id="stat-students">0</span>
              <span class="card-label">加入学生</span>
            </div>
          </div>
          <div class="dashboard-card stat">
            <div class="card-icon">❓</div>
            <div class="card-content">
              <span class="card-num" id="stat-questions">0</span>
              <span class="card-label">问题数</span>
            </div>
          </div>
          <div class="dashboard-card stat">
            <div class="card-icon">📝</div>
            <div class="card-content">
              <span class="card-num" id="stat-answers">0</span>
              <span class="card-label">回答数</span>
            </div>
          </div>
          <div class="dashboard-card stat">
            <div class="card-icon">⭐</div>
            <div class="card-content">
              <span class="card-num" id="stat-avg">0</span>
              <span class="card-label">平均分</span>
            </div>
          </div>
        </div>
        
        <!-- 发布问题 -->
        <div class="question-panel">
          <h3>发布问题</h3>
          <div class="question-form">
            <textarea id="question-content" placeholder="请输入音乐鉴赏问题，例如：&#10;请描述这段音乐的速度、力度和情感特点"></textarea>
            <div class="dimension-selector">
              <label class="dimension-label">选择评分维度：</label>
              <div class="dimension-checkboxes">
                <label class="dimension-checkbox">
                  <input type="checkbox" name="dimensions" value="perception" checked>
                  <span>音乐感知力</span>
                </label>
                <label class="dimension-checkbox">
                  <input type="checkbox" name="dimensions" value="emotion" checked>
                  <span>情感理解力</span>
                </label>
                <label class="dimension-checkbox">
                  <input type="checkbox" name="dimensions" value="culture" checked>
                  <span>文化认知</span>
                </label>
                <label class="dimension-checkbox">
                  <input type="checkbox" name="dimensions" value="aesthetic" checked>
                  <span>审美判断</span>
                </label>
                <label class="dimension-checkbox">
                  <input type="checkbox" name="dimensions" value="expression" checked>
                  <span>表达规范</span>
                </label>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" onclick="publishQuestion()">发布问题</button>
            </div>
          </div>
        </div>
        
        <!-- 当前问题 -->
        <div class="current-question" id="current-question-section" style="display: none;">
          <h3>当前问题</h3>
          <div class="question-card active">
            <div class="question-content" id="current-question-text"></div>
            <div class="question-meta">
              <span id="current-question-answers">0</span> 人已回答
              <span class="separator">|</span>
              <span id="current-question-avg">0</span> 平均分
            </div>
          </div>
        </div>
        
        <!-- 问题历史 -->
        <div class="question-history">
          <h3>问题历史</h3>
          <div class="history-list" id="question-history">
            <p class="empty-state">暂无问题记录</p>
          </div>
        </div>
        
        <!-- 学生成绩概览 - 竖向柱状图 -->
        <div class="stats-overview-section" id="stats-overview-section" style="display: none;">
          <h3>📊 学生成绩概览</h3>
          <div class="bar-chart-container" style="height: 420px; overflow-x: auto; overflow-y: hidden;">
            <canvas id="student-scores-chart"></canvas>
          </div>
        </div>
        
        <!-- 学生课堂总评表格 -->
        <div class="student-total-scores" id="student-total-scores" style="display: none;">
          <h3>📋 学生课堂总评（100分制）</h3>
          <div class="total-scores-table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>学号</th>
                  <th>姓名</th>
                  <th>总评得分</th>
                  <th>已答题目</th>
                </tr>
              </thead>
              <tbody id="total-scores-tbody">
              </tbody>
            </table>
          </div>
          <div class="pagination" id="total-scores-pagination">
            <button class="page-btn" onclick="changeTotalScoresPage(-1)">‹ 上一页</button>
            <span class="page-info" id="total-scores-page-info">第 1/1 页</span>
            <button class="page-btn" onclick="changeTotalScoresPage(1)">下一页 ›</button>
          </div>
        </div>
        
        <!-- 评价图表 -->
        <div class="charts-section">
          <h3>评价分析</h3>
          <div class="charts-grid">
            <div class="chart-container">
              <h4>素养维度分析</h4>
              <canvas id="radar-chart"></canvas>
            </div>
            <div class="chart-container">
              <h4>得分分布</h4>
              <canvas id="score-distribution-chart"></canvas>
            </div>
          </div>
        </div>
        
        <!-- 学习效果词云 -->
        <div class="wordcloud-section" id="wordcloud-section" style="display: none;">
          <h3>☁️ 学习效果词云分析</h3>
          <div class="wordcloud-tabs" id="wordcloud-tabs"></div>
          <div class="wordcloud-container" id="wordcloud-container"></div>
        </div>
        
        <!-- 回答详情 -->
        <div class="answers-section">
          <h3>回答详情</h3>
          <div class="answer-list" id="answer-list">
            <p class="empty-state">暂无回答</p>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <!-- 创建课堂弹窗 -->
  <div id="create-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>创建课堂</h3>
        <button class="modal-close" onclick="closeCreateModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="classroom-name-input">课堂名称 *</label>
          <input type="text" id="classroom-name-input" placeholder="例如：音乐鉴赏第一课" required>
        </div>
        <div class="form-group">
          <label for="classroom-desc-input">描述</label>
          <textarea id="classroom-desc-input" rows="3" placeholder="可选"></textarea>
        </div>
        <div class="form-group">
          <label for="classroom-class-select">绑定班级</label>
          <select id="classroom-class-select">
            <option value="">不绑定</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCreateModal()">取消</button>
        <button class="btn btn-primary" onclick="createClassroom()">创建</button>
      </div>
    </div>
  </div>
  
  <!-- 二维码弹窗 -->
  <div id="qr-modal" class="modal">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h3>学生扫码加入</h3>
        <button class="modal-close" onclick="closeQRModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="qr-display">
          <img id="qr-code" src="" alt="课堂二维码">
        </div>
        <p class="qr-url" id="qr-url"></p>
        <button class="btn btn-secondary btn-block" onclick="copyJoinUrl()">复制链接</button>
      </div>
    </div>
  </div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/teacher.js"></script>
</body>
</html>
