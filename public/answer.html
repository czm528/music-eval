<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>答题 - 音乐鉴赏课</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="answer-page">
  <div class="answer-container">
    <!-- 课堂信息头部 -->
    <div class="classroom-header">
      <div class="classroom-info">
        <h1 id="classroom-name">音乐鉴赏课</h1>
        <p id="teacher-name">教师</p>
      </div>
      <div class="user-badge">
        <span id="user-name">学生</span>
      </div>
    </div>
    
    <!-- 加入表单（未加入时显示） -->
    <div id="join-form" class="join-section">
      <div class="join-card">
        <h2>👋 加入课堂</h2>
        <p class="join-hint">请输入您的姓名开始答题</p>
        <form onsubmit="joinClassroom(event)">
          <div class="form-group">
            <input type="text" id="student-name-input" placeholder="请输入姓名" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">
            加入课堂
          </button>
        </form>
      </div>
    </div>
    
    <!-- 答题区域（加入后显示） -->
    <div id="answer-section" class="answer-section hidden">
      <!-- 当前问题 -->
      <div class="question-card" id="question-card">
        <div class="question-label">
          <span class="label-icon">❓</span>
          当前问题
        </div>
        <div class="question-text" id="current-question">
          加载中...
        </div>
      </div>
      
      <!-- 回答状态 -->
      <div id="answer-status" class="answer-status">
        <!-- 未回答时显示答题表单 -->
        <div id="answer-form-section" class="answer-form-section">
          <!-- 文字回答模式 -->
          <div id="text-answer-area">
            <textarea id="answer-input" placeholder="请在这里输入您的回答..." rows="6"></textarea>
            <button class="btn btn-primary btn-block btn-lg" onclick="submitAnswer()">
              提交回答
            </button>
          </div>
          
          <!-- 音频回答模式（音频题时显示） -->
          <div id="audio-answer-area" style="display: none;">
            <div class="recorder-container">
              <div class="recorder-visual" id="recorder-visual">
                <div class="recorder-ring" id="recorder-ring">
                  <div class="recorder-btn" id="recorder-btn" onclick="toggleRecording()">
                    <span class="recorder-icon" id="recorder-icon">🎤</span>
                  </div>
                </div>
                <div class="recorder-status" id="recorder-status">点击开始录音</div>
                <div class="recorder-timer" id="recorder-timer" style="display: none;">00:00</div>
              </div>
              
              <!-- 试听区域 -->
              <div class="audio-preview" id="audio-answer-preview" style="display: none;">
                <audio id="student-audio-preview" controls style="width: 100%;"></audio>
                <button class="btn btn-sm" onclick="reRecord()" style="margin-top: 8px;">重新录音</button>
              </div>
              
              <!-- 参考旋律播放 -->
              <div class="reference-audio-section" id="reference-audio-section" style="display: none;">
                <h4>🎵 参考旋律</h4>
                <audio id="reference-audio-player" controls style="width: 100%;"></audio>
              </div>
              
              <button class="btn btn-primary btn-block btn-lg" id="submit-audio-btn" onclick="submitAudioAnswer()" style="display: none;">
                提交演唱
              </button>
            </div>
          </div>
          
          <!-- 旋律线答题模式 -->
          <div id="melody-answer-area" style="display: none;">
            <div class="melody-container">
              <p class="melody-hint">👆 在下方画布上绘制旋律线，从左侧起点开始，点击添加控制点</p>
              <div class="melody-canvas-wrapper" id="melody-canvas-wrapper">
                <canvas id="melody-canvas"></canvas>
              </div>
              <div class="melody-controls">
                <button class="btn btn-sm" onclick="undoMelodyPoint()">↩️ 撤销</button>
                <button class="btn btn-sm" onclick="clearMelodyCanvas()">🗑️ 清除</button>
              </div>
              <!-- 参考旋律播放（旋律线题也有参考音频） -->
              <div class="reference-audio-section" id="melody-reference-audio-section" style="display: none; margin-top: 12px;">
                <h4>🎵 参考旋律</h4>
                <audio id="melody-reference-audio-player" controls style="width: 100%;"></audio>
              </div>
              <button class="btn btn-primary btn-block btn-lg" id="submit-melody-btn" onclick="submitMelodyAnswer()">
                提交旋律线
              </button>
            </div>
          </div>
          
          <!-- 配色答题模式 -->
          <div id="color-answer-area" style="display: none;">
            <div class="color-container">
              <p class="color-hint">🎨 请为每句歌词选择合适的情绪颜色</p>
              <div class="color-segments" id="color-segments-container">
                <!-- 由JS动态生成 -->
              </div>
              <div class="color-palette">
                <p style="font-size:12px;color:#888;margin-bottom:8px;">情绪色卡：</p>
                <div class="color-options">
                  <div class="color-option" data-color="red" onclick="selectColor(this)">
                    <span class="color-emoji">🔴</span>
                    <span class="color-name">激昂</span>
                  </div>
                  <div class="color-option" data-color="orange" onclick="selectColor(this)">
                    <span class="color-emoji">🟠</span>
                    <span class="color-name">温暖</span>
                  </div>
                  <div class="color-option" data-color="yellow" onclick="selectColor(this)">
                    <span class="color-emoji">🟡</span>
                    <span class="color-name">欢快</span>
                  </div>
                  <div class="color-option" data-color="green" onclick="selectColor(this)">
                    <span class="color-emoji">🟢</span>
                    <span class="color-name">宁静</span>
                  </div>
                  <div class="color-option" data-color="blue" onclick="selectColor(this)">
                    <span class="color-emoji">🔵</span>
                    <span class="color-name">忧伤</span>
                  </div>
                  <div class="color-option" data-color="purple" onclick="selectColor(this)">
                    <span class="color-emoji">🟣</span>
                    <span class="color-name">神秘</span>
                  </div>
                  <div class="color-option" data-color="white" onclick="selectColor(this)">
                    <span class="color-emoji">⚪</span>
                    <span class="color-name">空灵</span>
                  </div>
                  <div class="color-option" data-color="brown" onclick="selectColor(this)">
                    <span class="color-emoji">🟤</span>
                    <span class="color-name">沉稳</span>
                  </div>
                </div>
              </div>
              <button class="btn btn-primary btn-block btn-lg" id="submit-color-btn" onclick="submitColorAnswer()">
                提交配色
              </button>
            </div>
          </div>
        </div>
        
        <!-- 已回答时显示结果 -->
        <div id="answer-result-section" class="answer-result-section hidden">
          <div class="result-header">
            <span class="result-icon">✅</span>
            <span>回答已提交</span>
          </div>
          
          <div class="score-display">
            <div class="score-circle">
              <span class="score-num" id="my-score">0</span>
              <span class="score-label">得分</span>
            </div>
          </div>
          
          <div class="dimensions-display" id="dimensions-display">
            <!-- 维度得分将由JS填充 -->
          </div>
          
          <div class="comment-section">
            <h4>💬 评语</h4>
            <p id="my-comment">正在加载评语...</p>
          </div>
          
          <div class="tips-section" id="tips-section" style="display: none;">
            <h4>📝 建议</h4>
            <ul id="my-tips"></ul>
          </div>
          
          <div class="pitch-chart-section" id="pitch-chart-section" style="display: none;">
            <h4>🎵 音高对比</h4>
            <div id="pitch-chart" style="width:100%;height:250px;"></div>
            <p style="font-size:12px;color:#888;text-align:center;margin-top:4px;">
              <span style="color:#5470c6">━━</span> 参考旋律 &nbsp;&nbsp;
              <span style="color:#ee6666">━━</span> 你的演唱
            </p>
          </div>
          
          <button class="btn btn-primary btn-block btn-lg" id="retry-btn" onclick="retryAnswer()" style="margin-top: 16px;">
            🔄 重新回答
          </button>
        </div>
      </div>
      
      <!-- 问题历史 -->
      <div class="history-section">
        <h3>📋 问题历史</h3>
        <div class="history-list" id="history-list">
          <p class="empty-state">暂无历史问题</p>
        </div>
      </div>
      
      <!-- 底部导航 -->
      <div class="bottom-nav">
        <a href="/student/profile" class="nav-btn">
          <span class="nav-icon">👤</span>
          <span>我的画像</span>
        </a>
        <button class="nav-btn" onclick="refreshQuestion()">
          <span class="nav-icon">🔄</span>
          <span>刷新</span>
        </button>
      </div>
    </div>
  </div>
  
  <!-- Toast提示 -->
  <div id="toast" class="toast"></div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/answer.js"></script>
</body>
</html>
